<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Device Order Form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="main.css" />
</head>

<body class="page">
  <main class="page__main">
    <section class="order-panel" aria-labelledby="order-title">
      <header class="order-panel__header">
        <div class="order-panel__header-main">
          <img src="images/logo1.svg" alt="">
          <!-- <p class="order-panel__eyebrow">ORDER PORTAL</p> -->
          <h1 class="order-panel__title" id="order-title">Device Order Form</h1>
          <p class="order-panel__subtitle">
            Complete the form below to place a device or cable order.
          </p>
        </div>

        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
          Light mode
        </button>
      </header>

      <form class="order-form" id="orderForm">
        <section class="order-form__section" aria-labelledby="customer-info-title">
          <h2 class="order-form__section-title" id="customer-info-title">
            Customer information
          </h2>

          <div class="order-form__grid order-form__grid--2">
            <div class="order-form__field">
              <label class="order-form__label" for="companyName">Company name</label>
              <input class="order-form__input" type="text" id="companyName" placeholder="Enter company name" required />
            </div>

            <div class="order-form__field">
              <label class="order-form__label" for="fullName">Full name</label>
              <input class="order-form__input" type="text" id="fullName" placeholder="Enter full name" required />
            </div>
          </div>

          <div class="order-form__grid order-form__grid--2">
            <div class="order-form__field">
              <label class="order-form__label" for="address">Address for ship</label>
              <textarea class="order-form__input order-form__input--textarea" id="address"
                placeholder="Enter shipping address" required></textarea>
            </div>

            <div class="order-form__field">
              <label class="order-form__label" for="phone">Phone number</label>
              <input class="order-form__input" type="text" id="phone" placeholder="Enter phone number" required />
            </div>
          </div>

          <div class="order-form__grid order-form__grid--2">
            <div class="order-form__field">
              <label class="order-form__label" for="usdot">USDOT</label>
              <input class="order-form__input" type="text" id="usdot" placeholder="Enter USDOT number" required />
            </div>
          </div>
        </section>

        <section class="order-form__section" aria-labelledby="order-type-title">
          <h2 class="order-form__section-title" id="order-type-title">Order type</h2>

          <div class="mode-switch" role="radiogroup" aria-labelledby="order-type-title">
            <label class="mode-switch__option">
              <input class="mode-switch__input" type="radio" name="orderMode" value="device-cable" checked />
              <span class="mode-switch__card">
                <span class="mode-switch__title">Device + Cable</span>
                <span class="mode-switch__text">Price per unit: $200</span>
              </span>
            </label>

            <label class="mode-switch__option">
              <input class="mode-switch__input" type="radio" name="orderMode" value="cable-only" />
              <span class="mode-switch__card">
                <span class="mode-switch__title">Cable only</span>
                <span class="mode-switch__text">Price per unit: $50</span>
              </span>
            </label>
          </div>
        </section>

        <section class="order-form__section" id="bundleSection" aria-labelledby="bundle-title">
          <h2 class="order-form__section-title" id="bundle-title">Device + Cable</h2>
          <div class="product-grid" id="bundleGrid"></div>
        </section>

        <section class="order-form__section" id="cableSection" aria-labelledby="cable-title" hidden>
          <h2 class="order-form__section-title" id="cable-title">Cable only</h2>
          <div class="product-grid" id="cableGrid"></div>
        </section>

        <section class="order-form__section" aria-labelledby="totals-title">
          <h2 class="order-form__section-title" id="totals-title">Order Summary</h2>

          <div class="totals-box">
            <div class="totals-box__row">
              <span class="totals-box__label">Product Total</span>
              <span class="totals-box__value" id="productTotal">$0</span>
            </div>

            <div class="totals-box__row">
              <span class="totals-box__label">Shipping</span>
              <span class="totals-box__value" id="shippingTotal">$40</span>
            </div>

            <div class="totals-box__row totals-box__row--grand">
              <span class="totals-box__label">Grand Total</span>
              <span class="totals-box__value" id="grandTotal">$40</span>
            </div>
          </div>
        </section>

        <section class="order-form__section" aria-labelledby="shipping-title">
          <h2 class="order-form__section-title" id="shipping-title">Type shipping</h2>

          <div class="shipping-grid" role="radiogroup" aria-labelledby="shipping-title">
            <label class="shipping-card">
              <input class="shipping-card__input" type="radio" name="shippingType" value="Standard" checked />
              <span class="shipping-card__content">
                <span class="shipping-card__title">Standard</span>
                <span class="shipping-card__price">$40</span>
                <span class="shipping-card__text">3 days</span>
              </span>
            </label>

            <label class="shipping-card">
              <input class="shipping-card__input" type="radio" name="shippingType" value="Medium" />
              <span class="shipping-card__content">
                <span class="shipping-card__title">Medium</span>
                <span class="shipping-card__price">$50</span>
                <span class="shipping-card__text">2 days</span>
              </span>
            </label>

            <label class="shipping-card">
              <input class="shipping-card__input" type="radio" name="shippingType" value="Overnight" />
              <span class="shipping-card__content">
                <span class="shipping-card__title">Overnight</span>
                <span class="shipping-card__price">$70</span>
                <span class="shipping-card__text">1 day</span>
              </span>
            </label>
          </div>
        </section>

        <footer class="order-form__footer">
          <button class="button button--primary" type="submit">Generate Order</button>
          <button class="button button--secondary" type="button" id="copyBtn">Copy Text</button>
        </footer>
      </form>

      <section class="summary" aria-labelledby="telegram-output-title">
        <header class="summary__header">
          <h2 class="summary__title" id="telegram-output-title">Telegram Output</h2>
        </header>

        <pre class="summary__output" id="telegramOutput">Fill out the form and click "Generate Order".</pre>
      </section>
    </section>
  </main>

  <script src="main.js"></script>
</body>

</html>
